<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply | Kota Institute of Technology & Sciences</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #003366;
            --secondary-color: #fca311;
            --text-dark: #333333;
            --text-light: #ffffff;
            --background-light: #f8f9fa;
            --border-color: #cccccc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            color: var(--text-dark);
            line-height: 1.6;
            background-color: var(--background-light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header (Matches Landing Page) */
        header {
            background-color: var(--primary-color);
            color: var(--text-light);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-decoration: none;
            color: var(--text-light);
        }

        .nav-back {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-back:hover {
            color: var(--secondary-color);
        }

        /* Form Container */
        .form-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem 20px;
        }

        .application-form {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 800px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--background-light);
        }

        .form-header h2 {
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .form-header p {
            color: #666;
        }

        /* Grid Layout for Form Fields */
        .form-section {
            margin-bottom: 2rem;
        }

        .form-section h3 {
            color: var(--primary-color);
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 500;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="date"],
        select,
        textarea {
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Checkbox specific styling */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Submit Button */
        .btn-submit {
            background-color: var(--primary-color);
            color: var(--text-light);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background-color: #002244;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* Footer */
        footer {
            background-color: #1a1a1a;
            color: #f1f1f1;
            text-align: center;
            padding: 1.5rem 5%;
            font-size: 0.9rem;
            margin-top: auto;
        }

    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">KITS</a>
        <a href="index.html" class="nav-back">&larr; Back to Home</a>
    </header>

    <main class="form-wrapper">
        <form class="application-form" action="#" method="POST" onsubmit="event.preventDefault(); alert('Application submitted successfully!');">
            
            <div class="form-header">
                <h2>Application for Admission</h2>
                <p>Fall 2026 Academic Cohort</p>
            </div>

            <div class="form-section">
                <h3>Personal Details</h3>
                <div class="input-grid">
                    <div class="input-group">
                        <label for="firstName">First Name *</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="input-group">
                        <label for="lastName">Last Name *</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                    <div class="input-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="input-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    <div class="input-group">
                        <label for="dob">Date of Birth *</label>
                        <input type="date" id="dob" name="dob" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Academic Background</h3>
                <div class="input-grid">
                    <div class="input-group">
                        <label for="prevInstitution">Previous Institution / High School *</label>
                        <input type="text" id="prevInstitution" name="prevInstitution" required>
                    </div>
                    <div class="input-group">
                        <label for="score">Current GPA / Percentage *</label>
                        <input type="text" id="score" name="score" placeholder="e.g., 3.8 or 92%" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Program Selection</h3>
                <div class="input-group">
                    <label for="program">Intended Major *</label>
                    <select id="program" name="program" required>
                        <option value="" disabled selected>Select a program...</option>
                        <option value="cs-ai">B.Tech - Computer Science & Artificial Intelligence</option>
                        <option value="ethical-tech">B.Tech - Ethical Tech & Algorithmic Fairness</option>
                        <option value="chem-sciences">B.Sc - Advanced Chemical Sciences</option>
                    </select>
                </div>
                
                <div class="input-group" style="margin-top: 1.5rem;">
                    <label for="statement">Statement of Purpose (Brief) *</label>
                    <textarea id="statement" name="statement" placeholder="Briefly describe your interest in your selected field..." required></textarea>
                </div>
            </div>

            <div class="form-section" style="margin-bottom: 1rem;">
                <div class="checkbox-group">
                    <input type="checkbox" id="declaration" name="declaration" required>
                    <label for="declaration" style="margin: 0; font-weight: 400; font-size: 0.9rem;">I declare that all information provided is accurate and complete.</label>
                </div>
            </div>

            <button type="submit" class="btn-submit">Submit Application</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Kota Institute of Technology & Sciences. All rights reserved.</p>
    </footer>

</body>
</html>
