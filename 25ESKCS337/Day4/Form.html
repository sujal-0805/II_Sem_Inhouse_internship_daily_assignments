<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete JS Assignment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            transition: background-color 0.3s, color 0.3s;
        }
        body.dark {
            background-color: #212529;
            color: #f8f9fa;
        }
        .error-msg {
            color: #dc3545;
            font-size: 0.875em;
            display: none; 
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-dark navbar-dark mb-5 shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">My Assignment</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Team</a></li>
                    <li class="nav-item me-3"><a class="nav-link" href="#">Contact</a></li>
                    
                    <li class="nav-item">
                        <button id="themeToggle" class="btn btn-outline-light btn-sm mt-2 mt-lg-0">Enable Dark Mode</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row align-items-stretch">
            
            <div class="col-md-6 mb-4">
                <div class="card p-4 shadow-sm h-100" id="formCard">
                    <h3 class="mb-4">Register</h3>
                    <form id="myForm">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" id="nameInput" class="form-control" placeholder="Enter your name">
                            <div id="nameError" class="error-msg mt-1">Name cannot be empty.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="text" id="emailInput" class="form-control" placeholder="Enter your email">
                            <div id="emailError" class="error-msg mt-1">Email must contain an '@' symbol.</div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Submit</button>
                    </form>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card p-4 shadow-sm text-center h-100" id="counterCard">
                    <h3 class="mb-4">Click Counter</h3>
                    <h1 id="countDisplay" class="display-1 fw-bold mb-4 text-primary">0</h1>
                    <div>
                        <button id="clickBtn" class="btn btn-success me-2 px-4 shadow-sm">Click Me!</button>
                        <button id="resetBtn" class="btn btn-danger px-4 shadow-sm">Reset</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const themeToggleBtn = document.getElementById('themeToggle');
        const bodyElement = document.body;
        const cards = document.querySelectorAll('.card'); 

        themeToggleBtn.addEventListener('click', () => {
            bodyElement.classList.toggle('dark');
            
            if (bodyElement.classList.contains('dark')) {
                themeToggleBtn.textContent = 'Disable Dark Mode';
                themeToggleBtn.classList.replace('btn-outline-light', 'btn-light');
                cards.forEach(card => card.classList.add('bg-dark', 'text-white', 'border-secondary'));
            } else {
                themeToggleBtn.textContent = 'Enable Dark Mode';
                themeToggleBtn.classList.replace('btn-light', 'btn-outline-light');
                cards.forEach(card => card.classList.remove('bg-dark', 'text-white', 'border-secondary'));
            }
        });

        let currentCount = 0; 
        const countDisplay = document.getElementById('countDisplay');
        const clickBtn = document.getElementById('clickBtn');
        const resetBtn = document.getElementById('resetBtn');

        clickBtn.addEventListener('click', () => {
            currentCount++; 
            countDisplay.textContent = currentCount; 
        });

        resetBtn.addEventListener('click', () => {
            currentCount = 0; 
            countDisplay.textContent = currentCount; 
        });

        const myForm = document.getElementById('myForm');
        const nameInput = document.getElementById('nameInput');
        const emailInput = document.getElementById('emailInput');
        const nameError = document.getElementById('nameError');
        const emailError = document.getElementById('emailError');

        myForm.addEventListener('submit', (event) => {
            event.preventDefault();

            let isValid = true;

            if (nameInput.value.trim() === '') {
                nameError.style.display = 'block'; 
                isValid = false;
            } else {
                nameError.style.display = 'none'; 
            }

            if (!emailInput.value.includes('@')) {
                emailError.style.display = 'block';
                isValid = false;
            } else {
                emailError.style.display = 'none';
            }

            if (isValid) {
                alert("Form validation successful!");
                myForm.reset(); 
            }
        });
    </script>
</body>
</html>
